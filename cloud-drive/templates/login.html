<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 - Cloud Drive</title>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --border: #2a2e3e;
    --text: #e4e4e7; --text-dim: #8b8fa3;
    --accent: #6366f1; --accent-hover: #818cf8;
    --danger: #ef4444; --radius: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
  }
  .login-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 2.5rem 2rem;
    width: 100%; max-width: 380px;
  }
  .login-card h1 {
    font-size: 1.5rem; font-weight: 700; text-align: center;
    margin-bottom: 0.25rem;
    background: linear-gradient(135deg, var(--accent), #a78bfa);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .login-card .subtitle {
    text-align: center; color: var(--text-dim);
    font-size: 0.85rem; margin-bottom: 1.75rem;
  }
  .form-group { margin-bottom: 1.1rem; }
  .form-group label {
    display: block; font-size: 0.8rem; color: var(--text-dim);
    margin-bottom: 0.4rem; font-weight: 500;
  }
  .form-group input {
    width: 100%; padding: 0.65rem 0.85rem; background: var(--bg);
    border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-size: 0.9rem; outline: none;
    transition: border-color 0.15s;
  }
  .form-group input:focus { border-color: var(--accent); }
  .error { color: var(--danger); font-size: 0.82rem; margin-bottom: 1rem; text-align: center; }
  .login-btn {
    width: 100%; padding: 0.7rem; background: var(--accent); color: #fff;
    border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 600;
    cursor: pointer; transition: background 0.2s;
  }
  .login-btn:hover { background: var(--accent-hover); }
</style>
</head>
<body>
<div class="login-card">
  <h1>Cloud Drive</h1>
  <p class="subtitle">请登录以继续</p>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  {% if request.args.get('msg') %}<div class="error" style="color:var(--accent);">{{ request.args.get('msg') }}</div>{% endif %}
  <form method="post">
    <div class="form-group">
      <label>用户名</label>
      <input type="text" name="username" autofocus required autocomplete="username">
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" name="password" required autocomplete="current-password">
    </div>
    <button type="submit" class="login-btn">登 录</button>
  </form>
  {% if registration_enabled %}
  <div style="text-align:center; margin-top:1rem; font-size:0.85rem; color:var(--text-dim);">
    没有账号？<a href="/register" style="color:var(--accent); text-decoration:none;">注册</a>
  </div>
  {% endif %}
</div>
</body>
</html>
